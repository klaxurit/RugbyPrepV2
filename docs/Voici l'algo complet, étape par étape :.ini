Voici l'algo complet, étape par étape :

  ---
  Architecture du moteur de génération de programme

  Point d'entrée : buildWeekProgram(profile, week, options?)

  ENTRÉE:
    - profile (UserProfile) : niveau, équipement, blessures,
  position, saison, sessions/sem...
    - week (CycleWeek) : H1-H4, W1-W8, DELOAD
    - options : fatigueLevel, featureFlags, ignoreAcwrOverload...

  SORTIE:
    - sessions: BuiltSession[]
    - warnings, hardConstraintEvents, qualityGateEvents
    - selectedArchetypeId, qualityScorecard?

  ---
  ÉTAPE 1 — Normalisation du profil (normalizeProfileInput)

  - trainingLevel invalide → fallback 'starter'
  - Starter → forcé à 2 sessions/sem
  - weeklySessions invalide → fallback 2
  - injuries / equipment null → []
  - level → 'beginner' ou 'intermediate'
  - seasonMode invalide → 'in_season'
  - performanceFocus invalide → 'balanced'

  ---
  ÉTAPE 2 — Résolution de la phase et des recettes

  2a. Phase de la semaine (getPhaseForWeek)

  ┌─────────┬───────────────────────┐
  │ Semaine │         Phase         │
  ├─────────┼───────────────────────┤
  │ H1-H4   │ HYPERTROPHY           │
  ├─────────┼───────────────────────┤
  │ W1-W4   │ FORCE                 │
  ├─────────┼───────────────────────┤
  │ W5-W8   │ POWER                 │
  ├─────────┼───────────────────────┤
  │ DELOAD  │ null → FORCE fallback │
  └─────────┴───────────────────────┘

  2b. Routing des recettes par niveau

  Starter (toujours 2 sessions) :
  → [LOWER_STARTER_V1, UPPER_STARTER_V1]

  Builder (2 ou 3 sessions) :
  2x → [LOWER_BUILDER_V1, UPPER_BUILDER_V1]
  3x → [LOWER_BUILDER_V1, UPPER_BUILDER_V1, FULL_BUILDER_V1]

  Performance (dépend de seasonMode + phase + performanceFocus) :
  off_season 3x → [LOWER_HYPER_V1, UPPER_HYPER_V1, COND_OFF_V1]
  pre_season 3x + speed → [LOWER_V1, UPPER_V1, SPEED_FIELD_PRE_V1]
  pre_season 3x → [LOWER_V1, UPPER_V1, COND_PRE_V1]
  in_season 3x + phase FORCE → [LOWER_V1, UPPER_V1, FULL_V1]
  in_season 3x + phase HYPER → [LOWER_HYPER_V1, UPPER_HYPER_V1,
  FULL_HYPER_V1]
  in_season 2x → [LOWER_V1, UPPER_V1] (ou HYPER variants selon phase)

  DELOAD : [RECOVERY_MOBILITY_V1]

  ---
  ÉTAPE 3 — Contrats de sécurité (applySafetyContracts)

  Appliqué dans cet ordre :

  1. Rehab routing : si rehabInjury actif, remplace les recettes
  upper/lower/full par la recette rehab correspondante
  (REHAB_UPPER_P1_V1, etc.)
  2. U18 hard caps (si feature flag actif) :
    - Consentement parental manquant → DELOAD uniquement
    120min match/sem, > 15min contact fort, > 30 matchs/saison →
  DELOAD
    - < 72h entre matchs → DELOAD
  3. ACWR fatigue (si données suffisantes + pas ignoré) :
    - critical → réduit à 1 seule séance (ou 1 séance rehab si rehab
  actif)
    - danger → dernière séance remplacée par RECOVERY_MOBILITY_V1

  ---
  ÉTAPE 4 — Archétype microcycle (si feature flags V2 activés)

  resolveMicrocycleArchetype attribue un archétype :
  - IN_SEASON_3X_STD / IN_SEASON_2X_STD : performance in-season
  - REHAB_UPPER / REHAB_LOWER : profil rehab
  - DELOAD_RECOVERY : semaine DELOAD
  - LEGACY_V1 : défaut

  Résout aussi les matchDayOffset (MD-1, MD-2...) si le planning club
   est renseigné.

  ---
  ÉTAPE 5 — Pattern d'intensité intra-semaine
  (getWeekIntensityPattern)

  ┌─────────────┬────────────────┬───────────────────────┐
  │   Niveau    │       2x       │          3x           │
  ├─────────────┼────────────────┼───────────────────────┤
  │ Starter     │ medium, medium │ medium, medium, light │
  ├─────────────┼────────────────┼───────────────────────┤
  │ Builder     │ medium, light  │ medium, medium, light │
  ├─────────────┼────────────────┼───────────────────────┤
  │ Performance │ heavy, medium  │ heavy, medium, light  │
  └─────────────┴────────────────┴───────────────────────┘

  ---
  ÉTAPE 6 — DUP : phase par session (getSessionPhase)

  In-season performance uniquement (DUP - Daily Undulating
  Periodization) :

  ┌───────────────┬─────────────┬───────────────────────────────┐
  │ Session index │    Phase    │        Qualité ciblée         │
  ├───────────────┼─────────────┼───────────────────────────────┤
  │ 0 (LOWER)     │ FORCE       │ 4×4-5 @ 85-90%, heavy         │
  ├───────────────┼─────────────┼───────────────────────────────┤
  │ 1 (UPPER)     │ POWER       │ 5×3 @ 70-75%, contrast/neural │
  ├───────────────┼─────────────┼───────────────────────────────┤
  │ 2 (FULL)      │ HYPERTROPHY │ 3×10-12 @ 60-65%, volume      │
  └───────────────┴─────────────┴───────────────────────────────┘

  Off/pre-season : toutes les sessions partagent la même phase (block
   periodization).
  Starter/Builder : pas de DUP (charge modérée constante).

  Chaque phase produit des preferTags qui influencent le scoring des
  blocs :
  - FORCE → ['force', 'hinge', 'squat', 'posterior_chain', 'contact',
   'trunk', 'shoulder_health']
  - POWER → ['neural', 'contrast', 'speed', 'power', 'unilateral',
  'plyo', 'med_ball', 'carry']
  - HYPERTROPHY → ['hypertrophy', 'push', 'pull', 'squat', 'hinge',
  'unilateral', 'upper', 'lower']

  ---
  ÉTAPE 7 — Construction de chaque session (buildSessionFromRecipe)

  C'est le coeur de l'algo. Pour chaque recette dans la liste :

  7a. Filtrage des blocs éligibles (selectEligibleBlocks)

  Filtre les ~88 blocs du catalogue :
  1. Equipment : tous les équipements requis (sauf 'none') doivent
  être dans le profil
  2. Contraindications bloc : aucune blessure du profil dans
  block.contraindications
  3. Contraindications exercice : aucun exercice du bloc avec
  contraindication correspondante (via getExerciseById)
  4. Niveau :
    - Starter → seulement blocs avec tag "starter"
    - Builder → blocs SANS tag "starter"
    - Performance → blocs SANS "starter" ni "builder"

  7b. Préférences de scoring

  Trois sources de tags de préférence fusionnées :
  1. Position rugby (positionPreferences) : ex. FRONT_ROW → prefer
  ['scrum', 'neck', 'contact', 'carry', 'hinge'], avoid ['speed']
  2. Phase/DUP (phasePreferences) : ex. FORCE → prefer ['force',
  'hinge', 'squat']
  3. Intensité (intensityPreferTags/avoidTags) : ex. heavy → prefer
  ['force', 'power', 'contrast'], avoid ['prehab', 'recovery']

  7c. Parcours de la séquence (slots) de la recette

  Exemple UPPER_V1 :
  [warmup?] → [activation!] → [neural?] → [contrast!] → [neck?] →
  [core?] → [carry?] → [cooldown?]
  (! = required, ? = optional)

  Pour chaque slot :

  Filtres de skip :
  - Warmup/Cooldown optionnels : skippés si :
    - pas de recette à haute demande neuromusculaire
  (neural/contrast/force)
    - pas de blessure/rehab
    - Builder : seulement si intensity=heavy ; Performance :
  seulement si heavy/medium
  - Finishers (neck/core/carry) : max 1 par session non-Full, max 2
  pour Full
  - Core après prehab : skippé sur LOWER_V1/LOWER_HYPER_V1 (évite
  redondance)

  Focus tags par slot (slotFocusTags) :
  Chaque slot peut avoir ses propres tags de focus (override du focus
   global de la recette).
  Ex. UPPER_V1 : slot neural → ['pull', 'posterior_chain'], slot
  contrast → ['push', 'push_pull']

  Les focus tags filtrent les blocs : seuls les blocs ayant au moins
  un tag en commun sont candidats (pour les intents principaux).

  7d. Scoring et sélection du meilleur bloc (chooseBlockByIntent)

  1. Filtrage candidats : intent correct + pas déjà utilisé
  (intra-session) + pas exclu (cross-session) + passe le filtre focus
   tags
  2. Scoring de chaque candidat :
  score = preferredTags(recette) × +1
        + preferTags(position + phase) × +3
        + avoidTags(position + phase) × -2
        + intensityPreferTags × +1
        + intensityAvoidTags × -1
  2. Tiebreaker : blockId alphabétique (déterministe)
  3. Cas spécial UPPER_V1 + neural : les blocs neural qui n'ont PAS
  d'overlap d'exercices avec les blocs activation/contrast déjà
  choisis sont priorisés (évite de répéter les mêmes mouvements)
  4. Anti-overlap exercice (canUseBlock) : un bloc est rejeté si un
  de ses exercices est déjà dans la session (sauf
  warmup/activation/cooldown → toujours OK)
  5. Anchor localStorage (browser uniquement) : si un anchor existe
  pour cet intent (activation/contrast/force required), on réutilise
  ce bloc en priorité — persistance côté client
  6. Rotation vs Stabilité :
    - Blocs principaux (force, contrast, neural, hypertrophy) →
  usableCandidates[0] — toujours le même d'une semaine à l'autre (KB
  §7.1 : adaptation neurale = 4+ semaines sur même mouvement)
    - Finishers (neck, core, carry) → rotation parmi les top 3
  candidats par weekRotationIndex % 3 — variété entre semaines
  7. Fallback chain si aucun bloc trouvé pour l'intent demandé :
  force → [contrast]
  contrast → [force]
  prehab → [core]
  neck → [core]
  8. Safety fallback (dernier recours pour slots required) :
  force → [core, prehab, activation, contrast, hypertrophy, neural]
  contrast → [core, prehab, activation, force, hypertrophy, neural]
  ...
  8. D'abord avec filtre focus tags forcé, puis sans filtre. Si
  utilisé → session marquée isSafetyAdapted.

  7e. Sélection de la version (pickVersion)

  Chaque bloc a 4 versions : W1, W2, W3, W4.
  La semaine courante est mappée sur une version de base :
  W1/W5/H1 → W1 (installation)
  W2/W6/H2 → W2 (montée)
  W3/W7/H3 → W3 (clé)
  W4/W8/H4 → W4 (pic)
  Même exercices, mais sets/reps/charge évoluent (double
  progression).

  7f. Cross-session exclusion

  Après construction de chaque session, les blockIds des intents de
  travail (hypertrophy, force, contrast, neural, core) sont ajoutés à
   usedMainBlockIds → exclus des sessions suivantes.

  Exception Starter : pas d'exclusion cross-session (1 seul bloc BW
  par catégorie, la variété vient de l'inversion des slots A/B).

  ---
  ÉTAPE 8 — Validation de chaque session (validateSession)

  Vérifie :
  - Exactement 1 bloc activation (sauf RECOVERY_MOBILITY)
  - Au moins 1 bloc principal (contrast/force/hypertrophy) sauf
  COND/REHAB_P1/RECOVERY
  - Pas de doublons de blockId
  - EMOM valides (reps/temps définis, assez de minutes)
  - Max 7 blocs par session
  - Finishers : max 1 (ou 2 pour Full Body)
  - Full Body balance : au moins 1 bloc majeur upper ET 1 lower

  ---
  ÉTAPE 9 — Quality Gates (si feature flag activé)

  Vérifie au niveau programme :
  - Missing required slot → session invalidée
  - Session vide → invalidée
  - Heavy on MD-1 → invalidée (si match proximity activé)
  - Full body imbalance (upper/lower incomplet) → invalidée
  - Upper blueprint : vérifie push + pull parmi les blocs majeurs
  - Lower blueprint : vérifie squat/hinge/unilateral (au moins 2
  patterns)
  - Starter ≠ 2 sessions → warning
  - Rehab + recette incompatible (FULL/COND) → invalidée

  Sessions invalidées → remplacées par RECOVERY_MOBILITY_V1 (fallback
   sécurité).

  ---
  ÉTAPE 10 — Quality Scorecard (si feature flag activé)

  Score global 0-100 composé de :
  - Safety (30%) : 100 - (hard violations × 25) - (quality violations
   × 15)
  - Microcycle (20%) : slots required satisfaits / total
  - Match Proximity (15%) : pas de heavy en MD-1
  - Structure (15%) : sessions non dégradées / total
  - Identity (10%) : sessions avec identity / total
  - Population (10%) : 0 si U18 sans consentement, sinon 100

  ---
  Résumé du flux

  profile + week
      │
      ▼
  [1] normalizeProfile ──→ profil nettoyé
      │
      ▼
  [2] getPhaseForWeek + routing recettes ──→ liste de
  SessionRecipeId[]
      │
      ▼
  [3] applySafetyContracts ──→ rehab routing + U18 caps + ACWR
  réduction
      │
      ▼
  [4] resolveMicrocycleArchetype (V2) ──→ archétype + matchDayOffset
      │
      ▼
  [5] getWeekIntensityPattern ──→ [heavy, medium, light]
      │
      ▼
  [6] getSessionPhase (DUP) ──→ phase par session [FORCE, POWER,
  HYPER]
      │
      ▼
    ┌─── POUR CHAQUE RECETTE ───────────────────────────┐
    │ [7a] selectEligibleBlocks (equipment+injuries+level)│
    │ [7b] merge preferTags (position+phase+intensity)    │
    │ [7c] parcours slots de la recette                   │
    │ [7d] scoring → top candidat (stable) ou rotation    │
    │      MAIN (force/contrast/neural/hyper) → FIXE      │
    │      FINISHERS (neck/core/carry) → ROTATION          │
    │ [7e] pickVersion (W1→W4 double progression)         │
    │ [7f] cross-session exclusion des blocs de travail   │
    └─────────────────────────────────────────────────────┘
      │
      ▼
  [8] validateSession ──→ warnings si structure incorrecte
      │
      ▼
  [9] qualityGates (V2) ──→ remplacement sessions dégradées
      │
      ▼
  [10] qualityScorecard (V2) ──→ score 0-100
      │
      ▼
    WeekProgramResult { sessions, warnings, ... }


    