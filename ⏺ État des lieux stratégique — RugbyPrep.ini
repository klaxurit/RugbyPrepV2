  2. Classement Free vs Payant

  La logique : le programme de base reste gratuit (hook principal), les couches d'intelligence
  et de coach sont premium.

  Gratuit — Le socle (accrocher, créer l'habitude)

  - Programme hebdomadaire complet (Starter/Builder/Performance)
  - Calendrier match + planning
  - Suivi séances (enregistrement charges)
  - Sessions mobilité
  - 3 tests physiques (tracking basique)
  - Chat IA coach : 5 messages/jour (découverte)
  - ACWR basique (calcul simple)

  Premium individuel (~6–8 €/mois ou ~50 €/an)

  - Chat IA coach illimité → coût API Claude réel, c'est la valeur perçue la plus forte
  - Progressive overload auto : suggestion charge +2.5kg, mémoire longue terme
  - ACWR avancé : intégration charges match RPE, alertes seuils 1.3/1.5
  - Protocoles réhab personnalisés (P1→P2→P3 adaptatif)
  - Sync cloud (Supabase backup multi-device)
  - Push notifications intelligentes (rappel séance, alerte fatigue)
  - Analytics saison complète (graphes progression annuelle)
  - Blocs conditionnement off/pré-saison

  Premium Coach / Club (~20–30 €/mois par club)

  (Feature #28 — à développer après V1)
  - Dashboard équipe : ACWR collectif, matrice risque joueurs
  - Gestion effectif (invitations joueurs)
  - Push séances au groupe
  - Rapports hebdo préparateur physique
  - Personnalisation programme par joueur

  ---
  3. Business Model recommandé

  Modèle : Freemium → Premium individuel → B2B Club

  JOUEUR                          CLUB / COACH
    │                                  │
    ▼                                  ▼
  Gratuit (hook)              Freemium découverte
    │                                  │
    ▼                                  ▼
  Premium 6€/mois             Licence Club 20-30€/mois
  (coach IA + overload)       (team dashboard + gestion)

  Pourquoi ce modèle :
  - Le gratuit crée une base d'utilisateurs → preuve sociale → ventes B2B clubs
  - Le premium individuel est cohérent avec le marché (Whoop, TrainHeroic, Hevy : 5–10€/mois)
  - Le B2B club est le vrai levier de revenus récurrents (1 club = 25–40 joueurs)
  - Les coûts IA (Claude API) sont couverts par le premium → variable cost maîtrisé

  Estimation réaliste

  ┌────────────────────┬──────────────────┬────────────────┐
  │      Segment       │    Cible an 1    │ Revenu mensuel │
  ├────────────────────┼──────────────────┼────────────────┤
  │ Premium individuel │ 200 joueurs × 6€ │ 1 200 €        │
  ├────────────────────┼──────────────────┼────────────────┤
  │ Clubs (B2B)        │ 5 clubs × 25€    │ 125 €          │
  ├────────────────────┼──────────────────┼────────────────┤
  │ Total an 1         │                  │ ~1 300 €/mois  │
  └────────────────────┴──────────────────┴────────────────┘

  Pas suffisant pour en vivre, mais suffisant pour couvrir les coûts (Supabase, Claude API,
  domaine) et tester la proposition de valeur.

  ---
  4. Go-to-market — Comment vendre

  Canal 1 : Les clubs FFR (actif immédiat)

  Tu as déjà clubFfrIds.json avec les clubs FFR indexés. C'est une liste de cibles directes.
  - Contacter les préparateurs physiques de clubs Fédérale 2/3 (budget serré, pas d'outils
  dédiés)
  - Proposer 2-3 mois offerts contre feedback + témoignages
  - Email direct : "Outil gratuit pour tes joueurs, tu gardes le contrôle"

  Canal 2 : Contenu éducatif (organique, 0€)

  - Instagram / TikTok : clips courts "comment structurer ta semaine de rugby" avec capture
  d'écran app
  - Cibler les hashtags : #rugbyfrance #préparationphysique #rugbytraining
  - Le coach IA est un argument fort — "ton coach physique à 6€/mois"

  Canal 3 : Communautés rugby

  - Forums FFR, groupes Facebook clubs amateurs
  - Reddit r/rugbyunion (EN) pour version internationale future
  - Bouche à oreille : 1 joueur convaincu = toute une équipe potentielle

  Canal 4 : App Stores (conversion organique)

  - Publier sur Google Play Store comme PWA (Trusted Web Activity)
  - Apple App Store nécessite un wrapper natif (Capacitor ou React Native) → après validation
  du modèle
  - ASO : "programme rugby" "préparation physique rugby" "coach rugby"

