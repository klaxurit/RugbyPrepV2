  ---
  Ma recommandation prioritaire

  Avant tout : implémenter #21 (progressive overload) et #22 (input charge match). Ce sont les
  deux features qui transforment l'app d'un "générateur de programme" en un "coach qui se
  souvient de toi". C'est ce qui justifie un abonnement.

  Le mode coach (#28) est ton vrai différenciateur B2B — aucun outil comparable en français
  pour les clubs amateurs FFR. C'est là que se trouve le revenu récurrent solide.

